<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TokenCost | TokenCost 登录</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23A371F7'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-weight='700'>T</text></svg>">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg-primary);
    }
    .auth-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-card .nav-logo {
      justify-content: center;
      margin-bottom: 8px;
    }
    .auth-card h2 {
      text-align: center;
      margin-bottom: 4px;
      font-size: 1.5rem;
    }
    .auth-card .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 28px;
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .auth-tab.active {
      background: var(--accent-purple);
      color: #fff;
    }
    .auth-tab:not(.active):hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .auth-form .form-group { margin-bottom: 14px; }
    .auth-form label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .auth-form .form-input {
      width: 100%;
      box-sizing: border-box;
    }
    .auth-form .btn {
      width: 100%;
      justify-content: center;
      margin-top: 8px;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      color: var(--text-tertiary);
      font-size: 0.75rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border-primary);
    }
    .auth-divider span { padding: 0 12px; }
    .oauth-btns {
      display: flex;
      gap: 10px;
    }
    .oauth-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-sm);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .oauth-btn:hover {
      background: var(--bg-primary);
      border-color: var(--accent-blue);
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }
    .auth-footer a {
      color: var(--accent-blue);
      text-decoration: none;
    }
    .auth-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #EF4444;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22C55E;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      margin-bottom: 16px;
      display: none;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-decoration: none;
    }
    .back-link:hover { color: var(--accent-blue); }
  </style>
  <script src="js/token-protect.js"></script>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">T</div>
      TokenCost
    </a>
    <h2 data-i18n="auth.title">Welcome Back</h2>
    <p class="subtitle" data-i18n="auth.subtitle">Sign in to unlock Pro features and save your comparisons</p>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" data-i18n="auth.sign_in">Sign In</button>
      <button class="auth-tab" data-tab="signup" data-i18n="auth.sign_up">Sign Up</button>
    </div>

    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>
    <div class="auth-info" id="authInfo" style="display:none;background:rgba(163,113,247,0.1);border:1px solid rgba(163,113,247,0.3);color:#A371F7;padding:10px 14px;border-radius:8px;font-size:0.8rem;margin-bottom:16px;">
      🛈 <strong>Demo Mode</strong> — No Supabase configured. Accounts are saved locally in your browser.
    </div>

    <!-- Login Form -->
    <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label data-i18n="auth.email">Email</label>
        <input type="email" class="form-input" id="loginEmail" required autocomplete="email">
      </div>
      <div class="form-group">
        <label data-i18n="auth.password">Password</label>
        <input type="password" class="form-input" id="loginPassword" required autocomplete="current-password" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" data-i18n="auth.sign_in_btn">Sign In</button>
    </form>

    <!-- Signup Form -->
    <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label data-i18n="auth.full_name">Full Name (optional)</label>
        <input type="text" class="form-input" id="signupName" autocomplete="name">
      </div>
      <div class="form-group">
        <label data-i18n="auth.email">Email</label>
        <input type="email" class="form-input" id="signupEmail" required autocomplete="email">
      </div>
      <div class="form-group">
        <label data-i18n="auth.password">Password</label>
        <input type="password" class="form-input" id="signupPassword" required autocomplete="new-password" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" data-i18n="auth.create_account">Create Account</button>
    </form>

    <div class="auth-divider"><span data-i18n="auth.or_continue">or continue with</span></div>
    <div class="oauth-btns">
      <button class="oauth-btn" onclick="handleOAuth('google')">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="oauth-btn" onclick="handleOAuth('github')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </button>
    </div>

    <a href="index.html" class="back-link" data-i18n="auth.back">← Back to TokenCost</a>
    <div class="auth-footer">
      <span data-i18n-html="auth.terms">By signing in, you agree to our <a href="terms.html" target="_blank">Terms</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>.</span>
    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script>
  // ── Tab switching ──
  document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
      hideMessages();
    });
  });

  // ── Error / Success display ──
  function showError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('authSuccess').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('authSuccess');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('authError').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authSuccess').style.display = 'none';
    document.getElementById('authInfo').style.display = 'none';
  }

  function showInfo(msg) {
    const el = document.getElementById('authInfo');
    el.innerHTML = msg;
    el.style.display = 'block';
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authSuccess').style.display = 'none';
  }

  // ── Login ──
  async function handleLogin(e) {
    e.preventDefault();
    hideMessages();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    const { error } = await AUTH.signIn(email, password);
    if (error) {
      showError(error.message || 'Login failed. Please check your credentials.');
    } else {
      showSuccess('Signed in! Redirecting...');
      setTimeout(() => {
        const intended = localStorage.getItem('tc_intended_plan');
        if (intended) {
          PAYMENT.checkout(intended);
        } else {
          window.location.href = 'index.html';
        }
      }, 800);
    }
  }

  // ── Signup ──
  async function handleSignup(e) {
    e.preventDefault();
    hideMessages();
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    const { data, error } = await AUTH.signUp(email, password, name);
    if (error) {
      showError(error.message || 'Signup failed.');
    } else if (data && data.user && !data.session) {
      // Email confirmation required — show info with resend option
      showInfo(
        '注册成功！请检查邮箱 ' + email + ' 中的确认链接。未收到邮件？' +
        '<a href="#" onclick="resendVerification(\'' + email + '\');return false;" style="color:#A371F7;text-decoration:underline;">重新发送</a>'
      );
      document.querySelector('.auth-tab[data-tab="login"]').click();
    } else {
      showSuccess('Account created! Redirecting...');
      setTimeout(function() {
        var intended = localStorage.getItem('tc_intended_plan');
        if (intended) {
          PAYMENT.checkout(intended);
        } else {
          window.location.href = 'index.html';
        }
      }, 800);
    }
  }

  // ── Resend verification ──
  async function resendVerification(email) {
    hideMessages();
    showInfo('正在重新发送验证邮件...');
    var result = await AUTH.resendVerification(email);
    if (result.error) {
      showError('发送失败：' + result.error.message);
    } else {
      showInfo('验证邮件已重新发送到 ' + email + '，请检查收件箱（包括垃圾邮件文件夹）。');
    }
  }

  // ── OAuth ──
  async function handleOAuth(provider) {
    hideMessages();
    const { error } = await AUTH.signInWithOAuth(provider);
    if (error) {
      showError(error.message || 'OAuth failed.');
    } else {
      showSuccess('Signed in! Redirecting...');
      setTimeout(() => window.location.href = 'index.html', 800);
    }
  }

  // ── Init ──
  document.addEventListener('DOMContentLoaded', () => {
    const lang = localStorage.getItem('tokenCostLang') || 'en';
    I18N.setLang(lang);

    // Initialize auth — auto demo mode if Supabase not configured
    AUTH.init().then(() => {
      if (AUTH.isDemo) {
        document.getElementById('authInfo').style.display = 'block';
      }
    });
  });
</script>
</body>
</html>
