function switchLang(lang) {
  document.querySelectorAll('.lang-switch-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) {
      el.textContent = TRANSLATIONS[lang][key];
    }
  });
  renderPosts(lang);
  // Save preference
  try { localStorage.setItem('tokenCostLang', lang); } catch(e) {}
}

    return `
      <div class="blog-post-full">
        <div class="blog-card-tag" style="display:inline-block;margin-bottom:8px;">${tag}</div>
        <h2><a href="${p.file}" style="color:inherit;text-decoration:none;">${title}</a></h2>
        <div class="meta">
          <span>${p.date}</span>
          <span>${p.read} ${readLabels[lang] || readLabels.en}</span>
        </div>
        <div class="excerpt">${excerpt}</div>
        <a href="${p.file}" class="read-more">${readMore[lang] || readMore.en}</a>
      </div>
    `;
  }).join('');
}

// Init — restore saved lang preference or detect browser
let initLang = 'en';
try {
  const saved = localStorage.getItem('tokenCostLang');
  if (saved && ['en','zh','ja','ko'].includes(saved)) initLang = saved;
} catch(e) {
  initLang = (navigator.language || 'en').startsWith('zh') ? 'zh' : 'en';
}
switchLang(initLang);
</script>

</body>
</html>
